name: Cleanup Old Artifacts

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    
    steps:
    - name: Delete old artifacts
      uses: actions/github-script@v7
      with:
        script: |
          const daysToKeep = 3;
          const msPerDay = 24 * 60 * 60 * 1000;
          const cutoffDate = new Date(Date.now() - daysToKeep * msPerDay);
          
          console.log(`Deleting artifacts older than ${daysToKeep} days (before ${cutoffDate.toISOString()})`);
          
          let page = 1;
          let totalDeleted = 0;
          let totalSize = 0;
          
          while (true) {
            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
              page: page
            });
            
            if (artifacts.artifacts.length === 0) {
              break;
            }
            
            for (const artifact of artifacts.artifacts) {
              const artifactDate = new Date(artifact.created_at);
              
              if (artifactDate < cutoffDate) {
                console.log(`Deleting artifact: ${artifact.name} (${artifact.size_in_bytes} bytes, created ${artifact.created_at})`);
                
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                
                totalDeleted++;
                totalSize += artifact.size_in_bytes;
              }
            }
            
            page++;
          }
          
          console.log(`\nCleanup complete:`);
          console.log(`- Deleted ${totalDeleted} artifacts`);
          console.log(`- Freed ${(totalSize / 1024 / 1024).toFixed(2)} MB`);
