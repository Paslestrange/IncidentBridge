name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Decode signing keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 -d > /tmp/incidentbridge.keystore
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build signed release APK
      run: |
        ./gradlew assembleMainlineRelease \
          -Pandroid.injected.signing.store.file=/tmp/incidentbridge.keystore \
          -Pandroid.injected.signing.store.password=${{ secrets.SIGNING_KEY_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.SIGNING_KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.SIGNING_KEY_ALIAS_PASSWORD }}
    
    - name: Upload release APK to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: incidentbridge-release-apk
        path: app/build/outputs/apk/mainline/release/*.apk
        retention-days: 30
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/mainline/release/*.apk
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Cleanup keystore
      if: always()
      run: rm -f /tmp/incidentbridge.keystore
